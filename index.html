<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羅馬假期財務報表</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    .modal-enter { opacity: 0; transform: scale(0.95); }
    .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    .modal-exit { opacity: 1; transform: scale(1); }
    .modal-exit-active { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .math-text { color: #000000; }

    .text-nowrap-truncate {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .responsive-title {
      font-size: clamp(1rem, 4.5vw, 1.5rem);
      white-space: nowrap;
    }
    .math-val { font-size: clamp(1.2rem, 6vw, 2.5rem); }
    .math-symbol { font-size: clamp(1rem, 4vw, 2rem); }
    .math-label { font-size: clamp(0.6rem, 2.5vw, 0.875rem); }

    .no-select {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .img-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: rgba(0,0,0,0);
    }

    .admin-trigger {
      cursor: pointer;
      user-select: none;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      body, html {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
      }
      #scrollContainer {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
      }
      
      #syncBtn, .search-container, #adminPanel {
        display: none !important;
      }
      .signature-area {
        display: flex !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      thead {
        display: table-header-group;
      }
      tr, td, th {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

  <!-- 頂部導航 -->
  <header class="bg-white shadow-sm border-b border-slate-200 z-40 shrink-0">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-center gap-2 flex-nowrap">
      <!-- 🚀 動態標題區塊 -->
      <h1 id="mainTitle" class="font-bold text-slate-800 tracking-tight responsive-title">
        載入資料中...
      </h1>
      
      <button 
        id="syncBtn"
        onclick="handleLoadData()"
        title="同步最新資料"
        class="text-indigo-600 hover:text-indigo-800 transition-colors p-1 flex items-center justify-center disabled:text-indigo-300 shrink-0"
      >
        <i id="syncIcon" class="ph ph-arrows-clockwise text-2xl md:text-3xl"></i>
      </button>
    </div>
  </header>

  <!-- 主要內容區 -->
  <div class="flex-1 overflow-auto no-scrollbar pb-10" id="scrollContainer">
    <main class="max-w-6xl mx-auto px-4 py-8">
      
      <!-- 整合式管理面板 -->
      <div id="adminPanel" class="hidden mb-10 overflow-hidden bg-white border border-indigo-200 rounded-2xl shadow-lg transition-all">
        <div class="bg-indigo-600 px-4 py-2 flex justify-between items-center">
          <div class="flex items-center gap-2 text-white text-sm font-bold">
            <i class="ph ph-shield-check"></i>
            <span>管理面板 (本地強制覆蓋)</span>
          </div>
          <button onclick="toggleAdminPanel()" class="text-indigo-200 hover:text-white"><i class="ph ph-x-circle text-xl"></i></button>
        </div>

        <div id="adminLocked" class="p-6 flex flex-col items-center gap-4">
          <p class="text-sm text-slate-500 font-medium text-center">本區域受密碼保護，請輸入管理密碼解鎖日期篩選功能</p>
          <div class="flex w-full max-w-sm gap-2">
            <input type="password" id="adminPasswordInput" placeholder="請輸入密碼..." class="flex-1 border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500" />
            <button onclick="unlockAdmin()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors">解鎖操作</button>
          </div>
          <div id="adminAuthError" class="hidden text-rose-500 text-xs font-bold animate-pulse">密碼錯誤，請重新輸入</div>
        </div>

        <div id="adminUnlocked" class="hidden p-6 bg-indigo-50/50">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="flex flex-col gap-1">
              <label class="text-xs text-indigo-600 font-bold ml-1">擷取交易開始日期</label>
              <select id="startDateSelect" onchange="handleAdminFilterChange()" class="bg-white border border-indigo-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs text-indigo-600 font-bold ml-1">擷取交易結束日期</label>
              <select id="endDateSelect" onchange="handleAdminFilterChange()" class="bg-white border border-indigo-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></select>
            </div>
          </div>
          <div class="mt-4 flex justify-between items-center">
            <span class="text-[10px] text-indigo-400 italic font-medium">※ 設定後將覆蓋全域 CONFIG，僅在您的設備上生效</span>
            <button onclick="resetAdminStatus()" class="text-xs text-indigo-600 hover:underline font-bold">重新鎖定並恢復全域預設</button>
          </div>
        </div>
      </div>

      <div id="errorBox" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex items-start gap-3">
        <i class="ph ph-warning-circle text-red-500 text-xl shrink-0 mt-0.5"></i>
        <p id="errorMsg" class="text-red-700 text-sm break-all"></p>
      </div>

      <!-- 總覽算式區 -->
      <div class="mb-12 flex justify-center w-full shrink-0 px-2">
        <div class="flex items-center gap-2 md:gap-8 math-text whitespace-nowrap">
          <div class="flex flex-col items-center">
            <span class="math-val font-bold tabular-nums">216,730</span>
            <span class="math-label text-slate-500 mt-1 font-medium">114年結餘</span>
          </div>
          <div class="math-symbol font-light text-slate-400">+</div>
          <div class="flex flex-col items-center">
            <span id="detailSumDisplay" class="math-val font-bold tabular-nums">0</span>
            <span class="math-label text-slate-500 mt-1 font-medium">本季收支</span>
          </div>
          <div class="math-symbol font-light text-slate-400">=</div>
          <div class="flex flex-col items-center">
            <span id="totalAmountDisplay" class="math-val font-bold tabular-nums">216,730</span>
            <span class="math-label text-slate-500 mt-1 font-medium">現在結餘</span>
          </div>
        </div>
      </div>

      <!-- 列表搜尋與明細區 -->
      <div class="flex flex-col">
        <div class="py-4 border-b border-slate-300 flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0">
          <h2 id="listTitle" class="text-base md:text-lg font-semibold text-slate-800 flex items-center self-start sm:self-auto whitespace-nowrap">
            載入資料中...
          </h2>
          <div class="relative w-full sm:w-64 search-container">
            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input 
              type="text" 
              id="searchInput"
              oninput="handleSearch()"
              placeholder="搜尋項目、內容、描述..." 
              class="w-full pl-9 pr-3 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow"
            />
          </div>
        </div>
        
        <div class="relative no-scrollbar">
          <div class="hidden md:block overflow-x-hidden">
            <table class="w-full text-left border-separate table-fixed" style="border-spacing: 0;">
              <thead>
                <tr class="text-slate-500 text-sm">
                  <th class="sticky top-0 z-20 bg-slate-50 h-12 px-4 md:px-6 font-medium whitespace-nowrap shadow-[0_1px_0_#cbd5e1] w-28 md:w-32">日期</th>
                  <th class="sticky top-0 z-20 bg-slate-50 h-12 px-4 md:px-6 font-medium shadow-[0_1px_0_#cbd5e1]">項目 / 明細</th>
                  <th class="sticky top-0 z-20 bg-slate-50 h-12 px-4 md:px-6 font-medium text-right whitespace-nowrap shadow-[0_1px_0_#cbd5e1] w-32 md:w-40">金額</th>
                </tr>
              </thead>
              <tbody id="desktopTableBody" class="bg-transparent"></tbody>
            </table>
          </div>

          <div class="md:hidden flex flex-col">
            <div class="sticky top-0 z-20 bg-slate-50 border-b border-slate-200 px-4 h-10 flex items-center justify-between text-[11px] font-bold text-slate-500 uppercase tracking-wider">
               <div class="w-16 pl-2">日期</div>
               <div class="flex-1 px-2 text-center">項目 / 明細</div>
               <div class="w-20 text-right">金額</div>
            </div>
            <div id="mobileCardList" class="flex flex-col pb-4"></div>
          </div>

          <div id="emptyState" class="hidden py-12 text-center text-slate-500 flex-col items-center justify-center">
            <i class="ph ph-funnel text-4xl text-slate-300 mb-2"></i>
            <p>找不到符合條件的記錄</p>
          </div>
        </div>
      </div>

      <!-- 紙本公告款式署名區 -->
      <div class="hidden md:flex print:flex w-full justify-between items-end mt-24 mb-4 text-[#000000] signature-area">
        <img src="https://pub-328fb034a36942da8335503ff2804fc7.r2.dev/RomaFReport.png" alt="報表 QRCode" class="w-28 h-28 object-contain pointer-events-none" />
        <div class="text-xl font-bold pb-2">主任委員：＿＿＿＿＿</div>
        <div class="text-xl font-bold pb-2">監察委員：＿＿＿＿＿</div>
        <div class="text-xl font-bold pb-2">財務委員：＿＿＿＿＿</div>
      </div>

    </main>
  </div>

  <!-- 交易明細燈箱 -->
  <div id="receiptModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 backdrop-blur-sm hidden modal-enter p-0 sm:p-4">
    <div class="bg-white w-full h-full sm:h-auto sm:max-h-[95vh] sm:max-w-4xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden" id="modalContentWrapper">
      <div class="shrink-0 flex items-center justify-between px-4 py-3 md:px-6 md:py-4 border-b border-slate-100 bg-white z-50">
        <div><h3 id="modalMainTitle" class="text-base md:text-lg font-bold text-slate-800">交易明細</h3></div>
        <button onclick="closeModal()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors focus:outline-none bg-slate-50 shrink-0">
          <i class="ph ph-x text-2xl"></i>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto no-scrollbar">
        <div class="px-4 py-6 md:px-8 md:py-8 bg-white">
          <div class="flex justify-between items-start gap-4 mb-4">
            <h4 id="modalCategory" class="text-2xl md:text-4xl font-bold text-slate-800 break-words flex-1"></h4>
            <div id="modalAmount" class="text-2xl md:text-4xl font-bold tabular-nums text-right shrink-0"></div>
          </div>
          <div class="flex flex-wrap items-center gap-3 text-slate-600">
            <span id="modalDate" class="flex items-center gap-1 font-medium bg-slate-100 px-3 py-1.5 rounded-md text-sm md:text-base"><i class="ph ph-calendar-blank"></i> </span>
            <span id="modalSubtitle" class="text-base md:text-lg font-medium"></span>
          </div>
        </div>
        <div id="modalImageContainer" class="bg-slate-100 flex flex-col items-center justify-start relative hidden no-select">
          <div class="img-overlay"></div>
          <img id="modalImage" src="" alt="單據圖片" class="w-full h-auto object-contain pointer-events-none" oncontextmenu="return false;" ondragstart="return false;" />
          <div id="modalLoading" class="py-20 flex flex-col items-center justify-center text-slate-400 gap-3"><i class="ph ph-spinner-gap animate-spin text-4xl text-indigo-400"></i><p class="text-sm">單據載入中...</p></div>
          <div id="modalError" class="hidden py-20 flex flex-col items-center justify-center text-slate-400 gap-3 w-full text-center px-4"><i class="ph ph-image-broken text-5xl text-slate-300"></i><p class="text-sm">無法顯示圖片。</p></div>
        </div>
        <div class="p-6 text-center text-slate-400 text-xs bg-white border-t border-slate-50 italic">— 財務明細僅供閱覽，單據版權所有 —</div>
      </div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1V2tkiYQ5qZFRDJ0mLFPzt6H_8zXDxrtgnoUdrBIm2Ao';
    const SHEET_NAME = 'ALLINDEX';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
    const configUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=CONFIG`;
    const ADMIN_PASSWORD = 'Roma257001008783';

    // 🚀 全域設定變數
    let globalStartDate = null;
    let globalEndDate = null;
    let reportYear = "115";
    let reportQuarter = "1";

    let allExpenses = []; // 儲存資料庫撈回的「所有資料」
    let filteredExpenses = []; // 搜尋後的顯示結果
    let sessionExpenses = []; // 當前依據日期篩選後的基準資料 (受 CONFIG 或面板控制)
    let expandedGroups = new Set();
    const FIXED_INITIAL_BALANCE = 216730;
    const customGroupOrder = ['管理費收入', '管理費代收支出', '清潔費支出', '零用金', '定存本息', '誤款收支'];

    // --- 全域資料篩選核心 (依據 CONFIG 設定) ---
    function getGlobalFilteredExpenses() {
      let result = allExpenses;
      if (globalStartDate && !isNaN(globalStartDate.getTime())) {
        result = result.filter(e => {
          const d = new Date(e.date);
          return !isNaN(d.getTime()) && d >= globalStartDate;
        });
      }
      if (globalEndDate && !isNaN(globalEndDate.getTime())) {
        result = result.filter(e => {
          const d = new Date(e.date);
          return !isNaN(d.getTime()) && d <= globalEndDate;
        });
      }
      return result;
    }

    // --- 管理面板核心邏輯 ---
    function toggleAdminPanel() {
      const panel = document.getElementById('adminPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        document.getElementById('adminPasswordInput').focus();
      }
    }

    function unlockAdmin() {
      const input = document.getElementById('adminPasswordInput');
      const error = document.getElementById('adminAuthError');
      if (input.value === ADMIN_PASSWORD) {
        document.getElementById('adminLocked').classList.add('hidden');
        document.getElementById('adminUnlocked').classList.remove('hidden');
        error.classList.add('hidden');
        populateDateDropdowns();
      } else {
        error.classList.remove('hidden');
      }
    }

    function resetAdminStatus() {
      document.getElementById('adminLocked').classList.remove('hidden');
      document.getElementById('adminUnlocked').classList.add('hidden');
      document.getElementById('adminPasswordInput').value = '';
      
      // 🚀 重新鎖定時，將資料範圍還原回 CONFIG 的全域設定
      sessionExpenses = getGlobalFilteredExpenses();
      handleSearch();
    }

    function populateDateDropdowns() {
      const startSelect = document.getElementById('startDateSelect');
      const endSelect = document.getElementById('endDateSelect');
      
      // 🚀 選單選項必須列出資料庫所有的日期 (allExpenses)，讓管理員有權選取 CONFIG 以外的日子
      const uniqueDates = [...new Set(allExpenses.map(e => e.date))].sort((a, b) => new Date(a) - new Date(b));
      
      startSelect.innerHTML = uniqueDates.map(d => `<option value="${d}">${d}</option>`).join('');
      endSelect.innerHTML = uniqueDates.map(d => `<option value="${d}">${d}</option>`).join('');
      
      // 自動停留在目前畫面正在顯示的區間
      if (sessionExpenses.length > 0) {
        const cur = sessionExpenses.map(e => e.date).sort((a, b) => new Date(a) - new Date(b));
        startSelect.value = cur[0];
        endSelect.value = cur[cur.length - 1];
      } else {
        endSelect.value = uniqueDates[uniqueDates.length - 1];
      }
    }

    function handleAdminFilterChange() {
      const start = new Date(document.getElementById('startDateSelect').value);
      const end = new Date(document.getElementById('endDateSelect').value);
      
      // 管理員手動篩選時，從 allExpenses (總資料) 中撈取，覆蓋全域設定
      sessionExpenses = allExpenses.filter(e => {
        const d = new Date(e.date);
        return d >= start && d <= end;
      });
      handleSearch();
    }

    // --- 資料載入與渲染邏輯 ---
    const formatMoney = (amount) => Number(amount).toLocaleString('zh-TW');

    function updateStats() {
      const absoluteSum = sessionExpenses.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
      document.getElementById('detailSumDisplay').textContent = formatMoney(absoluteSum);
      document.getElementById('totalAmountDisplay').textContent = formatMoney(FIXED_INITIAL_BALANCE + absoluteSum);
      document.getElementById('listTitle').innerHTML = `<i class="ph ph-list-dashes text-slate-500 mr-2"></i>本季收支 <span class="text-indigo-600 font-bold">${formatMoney(absoluteSum)}</span> 元，明細共 <span class="text-indigo-600 font-bold">${filteredExpenses.length}</span> 筆`;
    }

    function toggleGroup(groupName) {
      if (expandedGroups.has(groupName)) expandedGroups.delete(groupName);
      else expandedGroups.add(groupName);
      renderLists();
    }

    function openModal(id) {
      const exp = allExpenses.find(e => e.id === id);
      if (!exp) return;
      document.getElementById('modalMainTitle').textContent = `交易明細 - ${exp.content || '未分類'}`;
      document.getElementById('modalSubtitle').textContent = exp.description || '無描述';
      document.getElementById('modalCategory').textContent = exp.category || '未分類';
      document.getElementById('modalDate').innerHTML = `<i class="ph ph-calendar-blank"></i> ${exp.date || '-'}`;
      const mAmount = document.getElementById('modalAmount');
      mAmount.textContent = formatMoney(exp.amount);
      mAmount.className = `text-2xl md:text-4xl font-bold tabular-nums text-right ${exp.amount < 0 ? 'text-rose-600' : 'text-emerald-600'}`;
      document.getElementById('modalImage').classList.add('hidden');
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('modalLoading').classList.add('hidden');
      if (exp.receiptUrl && exp.receiptUrl.trim() !== '') {
        document.getElementById('modalImageContainer').classList.remove('hidden');
        document.getElementById('modalLoading').classList.remove('hidden');
        document.getElementById('modalImage').src = exp.receiptUrl;
      } else {
        document.getElementById('modalImageContainer').classList.add('hidden');
      }
      document.getElementById('receiptModal').classList.remove('hidden');
      setTimeout(() => { document.getElementById('receiptModal').classList.add('modal-enter-active'); }, 10);
    }

    function closeModal() {
      document.getElementById('receiptModal').classList.remove('modal-enter-active');
      document.getElementById('receiptModal').classList.add('modal-exit-active');
      setTimeout(() => { document.getElementById('receiptModal').classList.add('hidden'); document.getElementById('receiptModal').classList.remove('modal-exit-active'); document.getElementById('modalImage').src = ''; }, 200);
    }

    function renderLists() {
      const deskBody = document.getElementById('desktopTableBody');
      const mobileList = document.getElementById('mobileCardList');
      deskBody.innerHTML = ''; mobileList.innerHTML = '';
      if (filteredExpenses.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); return; }
      document.getElementById('emptyState').classList.add('hidden');

      const grouped = {};
      filteredExpenses.forEach(exp => {
        const key = (exp.content && exp.content.trim()) ? exp.content.trim() : '未分類項目';
        if (!grouped[key]) grouped[key] = { total: 0, items: [] };
        grouped[key].items.push(exp); grouped[key].total += exp.amount;
      });

      const sortedKeys = Object.keys(grouped).sort((a, b) => {
        const iA = customGroupOrder.indexOf(a), iB = customGroupOrder.indexOf(b);
        if (a === '未分類項目') return 1; if (b === '未分類項目') return -1;
        if (iA !== -1 && iB !== -1) return iA - iB;
        return (iA !== -1) ? -1 : (iB !== -1) ? 1 : a.localeCompare(b, 'zh-TW');
      });

      sortedKeys.forEach(groupName => {
        const group = grouped[groupName], isExp = expandedGroups.has(groupName), gColor = group.total < 0 ? 'text-rose-600' : 'text-emerald-600';
        const masterTr = document.createElement('tr');
        masterTr.className = 'cursor-pointer group select-none hover:bg-slate-50';
        masterTr.onclick = () => toggleGroup(groupName);
        masterTr.innerHTML = `<td class="sticky top-0 z-10 bg-white h-12 px-4 md:px-6 text-sm shadow-[0_1px_0_#e2e8f0]" colspan="2"><div class="flex items-center gap-2"><i class="ph ${isExp ? 'ph-caret-down' : 'ph-caret-right'} text-slate-400 font-bold"></i><span class="font-bold text-slate-800">${groupName}</span><span class="text-[10px] text-slate-500">(${group.items.length} 筆)</span></div></td><td class="sticky top-0 z-10 bg-white px-4 md:px-6 text-base font-bold text-right tabular-nums ${gColor} shadow-[0_1px_0_#e2e8f0]">${formatMoney(group.total)}</td>`;
        deskBody.appendChild(masterTr);

        const masterCard = document.createElement('div');
        masterCard.className = 'sticky top-[40px] z-10 bg-white border-y border-slate-200 px-4 py-3 flex items-center justify-between cursor-pointer select-none';
        masterCard.onclick = () => toggleGroup(groupName);
        masterCard.innerHTML = `<div class="flex items-center gap-2 min-w-0"><i class="ph ${isExp ? 'ph-caret-down' : 'ph-caret-right'} text-slate-400 font-bold"></i><span class="font-bold text-slate-800 text-sm truncate">${groupName}</span><span class="text-[10px] text-slate-500">(${group.items.length} 筆)</span></div><div class="text-base font-bold tabular-nums ${gColor}">${formatMoney(group.total)}</div>`;
        mobileList.appendChild(masterCard);

        if (isExp) {
          group.items.forEach(exp => {
            const hasIcon = (exp.receiptUrl && exp.receiptUrl.trim() !== '') ? '<i class="ph ph-image text-slate-400 ml-1"></i>' : '';
            const childTr = document.createElement('tr');
            childTr.className = 'hover:bg-slate-50 transition-colors cursor-pointer';
            childTr.onclick = () => openModal(exp.id);
            childTr.innerHTML = `<td class="py-3 px-4 md:px-6 text-sm text-slate-500 pl-10 border-b border-slate-100">${exp.date || '-'}</td><td class="py-3 px-4 md:px-6 text-sm text-slate-600 border-b border-slate-100 truncate"><div class="flex items-center gap-1"><span>${exp.category || '-'}</span>${hasIcon}</div></td><td class="py-3 px-4 md:px-6 text-sm font-semibold text-right tabular-nums ${exp.amount < 0 ? 'text-rose-600' : 'text-emerald-600'} border-b border-slate-100">${formatMoney(exp.amount)}</td>`;
            deskBody.appendChild(childTr);

            const childCard = document.createElement('div');
            childCard.className = 'bg-transparent px-4 py-4 border-b border-slate-100 hover:bg-slate-50 cursor-pointer flex items-center justify-between';
            childCard.onclick = () => openModal(exp.id);
            childCard.innerHTML = `<div class="w-16 text-[10px] text-slate-400 shrink-0">${exp.date || '-'}</div><div class="flex-1 px-2 text-sm text-slate-700 font-medium truncate flex items-center"><span>${exp.category || '-'}</span>${hasIcon}</div><div class="w-20 text-sm font-bold tabular-nums ${exp.amount < 0 ? 'text-rose-600' : 'text-emerald-600'} text-right shrink-0">${formatMoney(exp.amount)}</div>`;
            mobileList.appendChild(childCard);
          });
        }
      });
      updateStats();
    }

    function handleSearch() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      filteredExpenses = sessionExpenses.filter(exp => exp.description?.toLowerCase().includes(term) || exp.category?.toLowerCase().includes(term) || exp.content?.toLowerCase().includes(term));
      if (term) filteredExpenses.forEach(exp => expandedGroups.add(exp.content || '未分類項目'));
      renderLists();
    }

    // CSV 安全取值函式
    const getCell = (lines, rowIndex, colIndex) => {
      if (lines.length <= rowIndex) return null;
      const v = lines[rowIndex].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, '').replace(/\u00a0/g, ' '));
      return v[colIndex] || null;
    };

    function parseCSV(csvText) {
      const lines = csvText.split(/\r?\n/).slice(1).filter(l => l.trim() !== '');
      return lines.map((l, i) => {
        const v = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, '').replace(/\u00a0/g, ' '));
        const expStr = v[2] || '', incStr = v[3] || '';
        let amt = 0;
        if (expStr) amt = -Math.abs(parseFloat(expStr.replace(/[^0-9.-]/g, '')) || 0);
        else if (incStr) amt = Math.abs(parseFloat(incStr.replace(/[^0-9.-]/g, '')) || 0);
        return { id: `row-${i}`, date: v[0] || '', content: v[10] || '', amount: amt, description: v[5] || '', category: v[11] || '未分類', receiptUrl: v[12] || '' };
      }).filter(item => {
        const y4 = item.date.match(/(\d{4})/), y3 = item.date.match(/(11\d)/);
        let year = y4 ? parseInt(y4[0]) : (y3 ? parseInt(y3[0]) + 1911 : 0);
        return year >= 2026 && (item.date || item.amount !== 0); // 排除 2026 以前或無效資料
      });
    }

    async function handleLoadData() {
      const syncBtn = document.getElementById('syncBtn');
      const syncIcon = document.getElementById('syncIcon');
      syncBtn.disabled = true; syncIcon.className = 'ph ph-arrows-clockwise animate-spin text-2xl md:text-3xl';
      
      try {
        // 🚀 Step 1: 讀取 CONFIG 全域設定
        try {
          const cUrl = `${configUrl}&t=${Date.now()}`;
          const cRes = await fetch(cUrl).catch(() => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(cUrl)}`));
          
          if (cRes && cRes.ok) {
            const cTxt = await cRes.text();
            const configLines = cTxt.split(/\r?\n/).filter(l => l.trim() !== '');
            
            // 擷取第二列與第三列的設定值
            const a2 = getCell(configLines, 1, 0); // CONFIG!A2 (開始日期)
            const b2 = getCell(configLines, 1, 1); // CONFIG!B2 (年份)
            const c2 = getCell(configLines, 1, 2); // CONFIG!C2 (季別)
            const a3 = getCell(configLines, 2, 0); // CONFIG!A3 (結束日期)
            
            if (a2) globalStartDate = new Date(a2);
            if (a3) globalEndDate = new Date(a3);
            if (b2) reportYear = b2;
            if (c2) reportQuarter = c2;
          }
        } catch (configErr) {
          console.warn('無法讀取 CONFIG 設定，將使用預設值。', configErr);
        }

        // 🚀 動態更新標題文字
        const titleText = `民國${reportYear}年度第${reportQuarter}季 羅馬假期財務報表`;
        document.title = titleText;
        document.getElementById('mainTitle').innerHTML = `民國${reportYear}年度第${reportQuarter}季 <span class="admin-trigger text-indigo-800" onclick="toggleAdminPanel()">羅馬假期</span>財務報表`;

        // 🚀 Step 2: 讀取 ALLINDEX 明細資料
        const fUrl = `${csvUrl}&t=${Date.now()}`;
        let res = await fetch(fUrl).catch(() => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(fUrl)}`));
        if (!res.ok) throw new Error(`HTTP 錯誤 ${res.status}`);
        
        const txt = await res.text();
        allExpenses = parseCSV(txt);
        
        // 將資料透過 CONFIG 的區間過濾，設定為預設顯示範圍
        sessionExpenses = getGlobalFilteredExpenses();
        handleSearch();
        
      } catch (err) {
        document.getElementById('errorMsg').textContent = '同步資料失敗: ' + err.message;
        document.getElementById('errorBox').classList.remove('hidden');
      } finally {
        syncBtn.disabled = false; syncIcon.className = 'ph ph-arrows-clockwise text-2xl md:text-3xl';
      }
    }

    document.getElementById('modalImage').onload = () => { document.getElementById('modalLoading').classList.add('hidden'); document.getElementById('modalImage').classList.remove('hidden'); };
    document.getElementById('modalImage').onerror = () => { document.getElementById('modalLoading').classList.add('hidden'); document.getElementById('modalError').classList.remove('hidden'); };
    document.addEventListener('DOMContentLoaded', handleLoadData);
  </script>
</body>
</html>
